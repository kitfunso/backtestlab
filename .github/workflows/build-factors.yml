name: Weekly factor score build

# Rebuilds public/india/factors.json from the cached NSE price JSONs.
# Runs Saturdays at 04:00 UTC (09:30 IST) — safely after NSE Friday close
# and well before the next Monday open, so the wizard always consumes a
# freshly-computed set of factor scores.

on:
  schedule:
    - cron: '0 4 * * 6'  # 04:00 UTC, Saturday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-factors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Build factor scores
        run: python scripts/build_factors.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/india/factors.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/india/factors.json
          git commit -m "data(factors): weekly rebuild $(date -u +%Y-%m-%d)"
          git push
