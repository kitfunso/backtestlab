name: News RSS aggregator

# Two schedules to respect GitHub Actions free-tier minute budget:
#   * every 10 minutes during IST market hours (09:15–16:00 IST ≈
#     03:45–10:30 UTC) Mon–Fri — the window when traders actually care
#     about fresh headlines.
#   * hourly the rest of the time so the panel stays warm overnight
#     without burning minutes.

on:
  schedule:
    - cron: '*/10 3-10 * * 1-5'   # 10-min during IST market hours
    - cron: '0 * * * *'            # hourly off-hours fallback
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch news feeds
        run: python scripts/fetch_news.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/india/news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/india/news.json
          git commit -m "data(news): RSS refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
